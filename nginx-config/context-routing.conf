# Context-based routing: one host, path-based dispatch to each stack
server {
    listen 8090;
    server_name routing.lab.local;

    location /python/ {
        proxy_pass http://127.0.0.1:8081/;
    }

    location /java/ {
        proxy_pass http://127.0.0.1:8080/javaapp/;
    }

    location /node/ {
        proxy_pass http://127.0.0.1:3000/;
    }
}

# URL/subdomain-based routing: each subdomain dispatches to a different stack
server {
    listen 80;
    server_name python.lab.local;
    location / { proxy_pass http://127.0.0.1:8081/; }
}

server {
    listen 80;
    server_name java.lab.local;
    location / { proxy_pass http://127.0.0.1:8080/javaapp/; }
}

server {
    listen 80;
    server_name node.lab.local;
    location / { proxy_pass http://127.0.0.1:3000/; }
}
